
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch The Ball</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
    min-height:100vh;
    color:white;
}

.game-area{
    height:500px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    position:relative;
    overflow:hidden;
    backdrop-filter: blur(10px);
}

.ball{
    width:70px;
    height:70px;
    border-radius:50%;
    position:absolute;
    cursor:pointer;
    display:none;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container py-5">

<div class="text-center mb-5">
<h1 class="display-4 fw-bold">🎮 Catch The Ball</h1>
<p class="lead">Mini game interaktif Bootstrap + JavaScript</p>
</div>

<div class="row g-4">

<div class="col-lg-4">

<div class="card shadow-lg border-0">
<div class="card-body text-center">

<h3>Score</h3>
<h1 id="score" class="display-2 text-primary">0</h1>

<hr>

<h3>Time</h3>
<h1 id="time" class="display-3 text-danger">30</h1>

<button class="btn btn-success btn-lg w-100 mt-3" onclick="startGame()">
Start Game
</button>

<button class="btn btn-dark btn-lg w-100 mt-3" onclick="changeTheme()">
Change Theme
</button>

</div>
</div>

</div>

<div class="col-lg-8">

<div class="game-area shadow-lg" id="gameArea">

<div id="ball" class="ball bg-warning"></div>

</div>

</div>

</div>

</div>

<script>

const ball = document.getElementById("ball");
const gameArea = document.getElementById("gameArea");

let score = 0;
let timeLeft = 30;
let gameActive = false;
let timer;

function moveBall(){

    const maxX = gameArea.clientWidth - 70;
    const maxY = gameArea.clientHeight - 70;

    const randomX = Math.floor(Math.random() * maxX);
    const randomY = Math.floor(Math.random() * maxY);

    ball.style.left = randomX + "px";
    ball.style.top = randomY + "px";

    const colors = [
        "bg-danger",
        "bg-warning",
        "bg-success",
        "bg-info",
        "bg-primary"
    ];

    const randomColor = colors[Math.floor(Math.random()*colors.length)];

    ball.className = "ball " + randomColor;

    ball.style.display = "block";
}

ball.addEventListener("click", function(){

    if(!gameActive) return;

    score++;

    document.getElementById("score").innerHTML = score;

    moveBall();

});

function startGame(){

    score = 0;
    timeLeft = 30;
    gameActive = true;

    document.getElementById("score").innerHTML = score;
    document.getElementById("time").innerHTML = timeLeft;

    moveBall();

    clearInterval(timer);

    timer = setInterval(function(){

        timeLeft--;

        document.getElementById("time").innerHTML = timeLeft;

        moveBall();

        if(timeLeft <= 0){

            clearInterval(timer);

            gameActive = false;

            ball.style.display = "none";

            alert("🎉 Game selesai! Score kamu: " + score);

        }

    },1000);

}

function changeTheme(){

    const gradients = [
        "linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4)",
        "linear-gradient(135deg,#3b0764,#9333ea,#ec4899)",
        "linear-gradient(135deg,#064e3b,#10b981,#34d399)",
        "linear-gradient(135deg,#7f1d1d,#dc2626,#f97316)"
    ];

    const randomBg = gradients[Math.floor(Math.random()*gradients.length)];

    document.body.style.background = randomBg;

}

</script>

</body>
</html>
